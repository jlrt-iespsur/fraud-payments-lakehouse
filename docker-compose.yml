name: fraud-lakehouse

services:
  postgres:
    image: postgres:16-alpine
    container_name: fraud-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lakehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lakehouse}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./runtime/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lakehouse} -d ${POSTGRES_DB:-platform}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: fraud-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./runtime/minio:/data
    networks:
      - lakehouse

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: fraud-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio123}; do
        echo 'Esperando a MinIO...';
        sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET:-lakehouse};
      /usr/bin/mc ls local/${MINIO_BUCKET:-lakehouse};
      "
    networks:
      - lakehouse

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fraud-kafka
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b kafka:9092 1 40"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - lakehouse

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fraud-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c "
      kafka-topics --create --if-not-exists
      --topic ${KAFKA_TOPIC:-payments}
      --bootstrap-server kafka:9092
      --partitions 3
      --replication-factor 1 &&
      kafka-topics --describe --topic ${KAFKA_TOPIC:-payments} --bootstrap-server kafka:9092
      "
    networks:
      - lakehouse

  spark:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: fraud-spark
    command: /bin/bash -lc "tail -f /dev/null"
    working_dir: /opt/project
    volumes:
      - ./:/opt/project
    environment:
      HOME: /tmp
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "${SPARK_UI_PORT_START:-4040}-${SPARK_UI_PORT_END:-4050}:4040-4050"
    networks:
      - lakehouse

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fraud-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8082}:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - lakehouse

  generator:
    build:
      context: .
      dockerfile: docker/python-app/Dockerfile
    container_name: fraud-generator
    command: /bin/sh -c "tail -f /dev/null"
    working_dir: /opt/project
    volumes:
      - ./:/opt/project
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - lakehouse

  trino:
    image: trinodb/trino:477
    container_name: fraud-trino
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${TRINO_PORT:-8080}:8080"
    volumes:
      - ./config/trino/jvm.config:/etc/trino/jvm.config
      - ./config/trino/catalog:/etc/trino/catalog
    networks:
      - lakehouse

  superset-init:
    build:
      context: .
      dockerfile: docker/superset/Dockerfile
    container_name: fraud-superset-init
    depends_on:
      postgres:
        condition: service_healthy
      trino:
        condition: service_started
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-fraud-superset-secret}
      SUPERSET_HOME: /app/superset_home
    entrypoint:
      - /bin/sh
      - -c
      - >
        superset db upgrade &&
        superset fab create-admin --username ${SUPERSET_ADMIN_USER:-admin} --firstname Admin --lastname Admin --email ${SUPERSET_ADMIN_EMAIL:-admin@example.com} --password ${SUPERSET_ADMIN_PASSWORD:-admin} || true &&
        superset init
    volumes:
      - ./runtime/superset:/app/superset_home
      - ./:/opt/project
    networks:
      - lakehouse

  superset:
    build:
      context: .
      dockerfile: docker/superset/Dockerfile
    container_name: fraud-superset
    depends_on:
      superset-init:
        condition: service_completed_successfully
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-fraud-superset-secret}
      SUPERSET_HOME: /app/superset_home
    entrypoint:
      - /bin/sh
      - -c
      - >
        gunicorn --bind 0.0.0.0:8088 --workers 2 --timeout 120 'superset.app:create_app()'
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    volumes:
      - ./runtime/superset:/app/superset_home
      - ./:/opt/project
    networks:
      - lakehouse

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: fraud-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-lakehouse}:${POSTGRES_PASSWORD:-lakehouse}@postgres:5432/${POSTGRES_DB:-platform}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      _PIP_ADDITIONAL_REQUIREMENTS: ""
    entrypoint:
      - /bin/bash
      - -c
      - >
        airflow db migrate &&
        airflow users create --role Admin --username ${AIRFLOW_ADMIN_USER:-admin} --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} --firstname Airflow --lastname Admin --password ${AIRFLOW_ADMIN_PASSWORD:-admin} || true
    volumes:
      - ./:/opt/project
      - ./runtime/airflow:/opt/airflow
    networks:
      - lakehouse

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: fraud-airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      neo4j:
        condition: service_started
      trino:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
      AIRFLOW__CORE__PARALLELISM: "4"
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "2"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-lakehouse}:${POSTGRES_PASSWORD:-lakehouse}@postgres:5432/${POSTGRES_DB:-platform}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"
      AIRFLOW__WEBSERVER__WORKERS: "1"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      TRINO_HOST: host.docker.internal
      TRINO_PORT: "8080"
      TRINO_CATALOG: iceberg
      TRINO_SCHEMA: payments
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
      PYTHONPATH: /opt/project
    command: airflow webserver
    ports:
      - "${AIRFLOW_PORT:-8081}:8080"
    volumes:
      - ./:/opt/project
      - ./runtime/airflow:/opt/airflow
    networks:
      - lakehouse

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: fraud-airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      neo4j:
        condition: service_started
      trino:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
      AIRFLOW__CORE__PARALLELISM: "4"
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "2"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-lakehouse}:${POSTGRES_PASSWORD:-lakehouse}@postgres:5432/${POSTGRES_DB:-platform}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"
      AIRFLOW__SCHEDULER__PARSING_PROCESSES: "1"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      TRINO_HOST: host.docker.internal
      TRINO_PORT: "8080"
      TRINO_CATALOG: iceberg
      TRINO_SCHEMA: payments
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
      PYTHONPATH: /opt/project
    command: airflow scheduler
    volumes:
      - ./:/opt/project
      - ./runtime/airflow:/opt/airflow
    networks:
      - lakehouse

  neo4j:
    image: neo4j:5.26-community
    container_name: fraud-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j_password}
      NEO4J_server_directories_import: /import
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 256m
      NEO4J_server_memory_pagecache_size: 128m
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - ./runtime/neo4j/data:/data
      - ./runtime/neo4j/import:/import
    networks:
      - lakehouse

networks:
  lakehouse:
    driver: bridge
